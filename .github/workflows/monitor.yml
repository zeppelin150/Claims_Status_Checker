name: WOIP Monitor

# Syncs the Asana "Waiting On Insurance Partner" section into Sheet1 every 5 min.
# Idempotent — safe to re-run. GitHub enforces a minimum cron cadence of 5 min
# but often delays 10-15 min under load; actual cadence may vary.

on:
  schedule:
    - cron: '*/5 * * * *'     # every 5 minutes
  workflow_dispatch:           # also allow manual trigger

# Minimum permissions for the GITHUB_TOKEN — workflow only reads code, no
# need for write access to issues / PRs / pages / etc.
permissions:
  contents: read

concurrency:
  group: woip-monitor           # cancel overlapping runs
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't keep .git/config credentials around in the workspace —
          # blocks zizmor's `artipacked` finding (cred leak via artifacts).
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run monitor sweep
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          ASANA_PAT:                    ${{ secrets.ASANA_PAT }}
          ASANA_PROJECT_GID:            ${{ secrets.ASANA_PROJECT_GID }}
          ASANA_SECTION_WOIP:           ${{ secrets.ASANA_SECTION_WOIP }}
          ASANA_FIELD_CLAIMS_TEXT:      ${{ secrets.ASANA_FIELD_CLAIMS_TEXT }}
          ASANA_RECORDER_TASK_GID:      ${{ secrets.ASANA_RECORDER_TASK_GID }}
        run: python3 asana_monitor.py
